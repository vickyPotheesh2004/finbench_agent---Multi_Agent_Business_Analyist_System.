[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
# PYTEST_RUNNING=1 raises RAM halt threshold to 15.4GB for test env.
# BGE + CrossEncoder both loaded in same pytest process = ~14.2GB peak.
# Production pipeline runs them sequentially — C4 14GB still enforced.
addopts = --import-mode=importlib -p no:randomly
env = PYTEST_RUNNING=1