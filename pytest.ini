[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
# CRITICAL: BGE loads 500MB model — must run LAST
# Running it standalone causes C4 halt for subsequent tests
# Always run: pytest tests\ -q  (full suite, fresh PowerShell)
addopts = --import-mode=importlib -p no:randomly